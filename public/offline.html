<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scoundrel — Offline</title>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', system-ui, sans-serif;
        background: #0e0f12;
        color: #eceff2;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
      }
      .card {
        background: #1a1c20;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 18px;
        padding: 32px;
        max-width: 420px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 8px;
        letter-spacing: 1px;
      }
      p {
        margin: 0 0 16px;
        color: #a5acb4;
      }
      a {
        color: #6ee7b7;
        text-decoration: none;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Scoundrel</h1>
      <p>
        You’re offline. The adventure is already packed for you, so reload when
        you’re back online to continue playing.
      </p>
      <a href="/">Go home</a>
    </div>
  </body>
</html>
